<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nanobot</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <!-- Header -->
    <header id="header">
      <div class="header-left">
        <span class="logo">N</span>
        <span class="brand">Nanobot</span>
      </div>
      <div class="header-right">
        <button id="btn-settings" class="icon-btn" title="Settings">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
            <path d="M8 4.754a3.246 3.246 0 1 0 0 6.492 3.246 3.246 0 0 0 0-6.492zM5.754 8a2.246 2.246 0 1 1 4.492 0 2.246 2.246 0 0 1-4.492 0z"/>
            <path d="M9.796 1.343c-.527-1.79-3.065-1.79-3.592 0l-.094.319a.873.873 0 0 1-1.255.52l-.292-.16c-1.64-.892-3.433.902-2.54 2.541l.159.292a.873.873 0 0 1-.52 1.255l-.319.094c-1.79.527-1.79 3.065 0 3.592l.319.094a.873.873 0 0 1 .52 1.255l-.16.292c-.892 1.64.901 3.434 2.541 2.54l.292-.159a.873.873 0 0 1 1.255.52l.094.319c.527 1.79 3.065 1.79 3.592 0l.094-.319a.873.873 0 0 1 1.255-.52l.292.16c1.64.893 3.434-.902 2.54-2.541l-.159-.292a.873.873 0 0 1 .52-1.255l.319-.094c1.79-.527 1.79-3.065 0-3.592l-.319-.094a.873.873 0 0 1-.52-1.255l.16-.292c.893-1.64-.902-3.433-2.541-2.54l-.292.159a.873.873 0 0 1-1.255-.52l-.094-.319zm-2.633.283c.246-.835 1.428-.835 1.674 0l.094.319a1.873 1.873 0 0 0 2.693 1.115l.291-.16c.764-.415 1.6.42 1.184 1.185l-.159.292a1.873 1.873 0 0 0 1.116 2.692l.318.094c.835.246.835 1.428 0 1.674l-.319.094a1.873 1.873 0 0 0-1.115 2.693l.16.291c.415.764-.421 1.6-1.185 1.184l-.291-.159a1.873 1.873 0 0 0-2.693 1.116l-.094.318c-.246.835-1.428.835-1.674 0l-.094-.319a1.873 1.873 0 0 0-2.692-1.115l-.292.16c-.764.415-1.6-.421-1.184-1.185l.159-.291A1.873 1.873 0 0 0 1.945 8.93l-.319-.094c-.835-.246-.835-1.428 0-1.674l.319-.094A1.873 1.873 0 0 0 3.06 4.377l-.16-.292c-.415-.764.42-1.6 1.185-1.184l.292.159a1.873 1.873 0 0 0 2.692-1.115l.094-.319z"/>
          </svg>
        </button>
        <button id="btn-new" class="icon-btn" title="New Session">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
            <path d="M8 2a.75.75 0 0 1 .75.75v4.5h4.5a.75.75 0 0 1 0 1.5h-4.5v4.5a.75.75 0 0 1-1.5 0v-4.5h-4.5a.75.75 0 0 1 0-1.5h4.5v-4.5A.75.75 0 0 1 8 2z"/>
          </svg>
        </button>
      </div>
    </header>

    <!-- Main -->
    <div id="main">
      <!-- Session sidebar -->
      <aside id="sidebar">
        <div id="session-list"></div>
      </aside>

      <!-- Chat area -->
      <section id="chat-area">
        <div id="empty-state">
          <div class="empty-icon">N</div>
          <p>New Conversation</p>
          <p class="empty-hint">Press <kbd>+</kbd> to start</p>
        </div>

        <div id="messages" class="hidden"></div>

        <div id="input-bar" class="hidden">
          <div id="conn-status"></div>
          <div class="input-row">
            <textarea id="msg-input" placeholder="Message Nanobot..." rows="1"></textarea>
            <button id="btn-send" class="icon-btn send-btn" title="Send (Enter)">
              <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
                <path d="M15.854.146a.5.5 0 0 1 .11.54l-5.819 14.547a.75.75 0 0 1-1.329.124l-3.178-4.995L.643 7.184a.75.75 0 0 1 .124-1.33L15.314.037a.5.5 0 0 1 .54.11ZM6.636 10.07l2.761 4.338L14.13 2.576 6.636 10.07Zm6.787-8.201L1.591 6.602l4.339 2.76 7.494-7.493Z"/>
              </svg>
            </button>
          </div>
        </div>
      </section>
    </div>

    <!-- Settings overlay -->
    <div id="settings-overlay" class="hidden">
      <div id="settings-panel">
        <h2>Settings</h2>
        <form id="settings-form">
          <label>
            <span class="label-text">Host</span>
            <input type="text" id="s-host">
          </label>
          <label>
            <span class="label-text">Port</span>
            <input type="number" id="s-port" min="1" max="65535">
          </label>
          <label>
            <span class="label-text">WS Path</span>
            <input type="text" id="s-path">
          </label>
          <label>
            <span class="label-text">Token Issue Path</span>
            <input type="text" id="s-issue-path">
          </label>
          <label>
            <span class="label-text">Token Issue Secret</span>
            <div class="input-with-toggle">
              <input type="password" id="s-secret">
              <button type="button" id="btn-toggle-secret" class="icon-btn toggle-pw" title="Show password">
                <svg class="eye-open" width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M8 3C4.5 3 1.7 5.5.5 8c1.2 2.5 4 5 7.5 5s6.3-2.5 7.5-5c-1.2-2.5-4-5-7.5-5zm0 8.5a3.5 3.5 0 1 1 0-7 3.5 3.5 0 0 1 0 7zm0-5.5a2 2 0 1 0 0 4 2 2 0 0 0 0-4z"/></svg>
                <svg class="eye-closed" width="16" height="16" viewBox="0 0 16 16" fill="currentColor" style="display:none"><path d="M2.1 2.1.7 3.5l2.3 2.3C2.1 7.2 1.3 8.5 1 8.5c1.2 2.5 4 5 7 5 1.2 0 2.3-.4 3.3-1l2.5 2.5 1.4-1.4L2.1 2.1zM8 11.5a3.5 3.5 0 0 1-3.1-1.9l.8-.8a2 2 0 0 0 3.6-1.2l1.2-1.2A3.5 3.5 0 0 1 8 11.5zm4.3-3.4L8.3 4.1A3.5 3.5 0 0 1 12.3 8.1z"/><path d="M1 8.5s1.8-4 7-4" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>
              </button>
            </div>
          </label>
          <label>
            <span class="label-text">Client ID</span>
            <input type="text" id="s-client-id">
          </label>
          <div class="form-actions">
            <button type="button" id="btn-settings-cancel" class="btn-secondary">Cancel</button>
            <button type="submit" class="btn-primary">Save</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script src="../lib/storage.js"></script>
  <script src="../lib/session.js"></script>
  <script src="../lib/ws-client.js"></script>
  <script src="app.js"></script>
</body>
</html>
